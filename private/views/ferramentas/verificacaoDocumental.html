<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedInventário - Ferramentas</title>

    <!-- favicon -->
    <link rel="shortcut icon" href="../../../assets/img/logo.png" type="image/png">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="../../../assets/bootstrap/bootstrap.min.css">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="../../../assets/fontawesome/all.min.css">

    <!-- folha de estilos CSS -->
    <link rel="stylesheet" href="../../../assets/css/1241445.css">
</head>

<body>
    <!-- Navbar -->
    <header class="bng-navbar-menu">

        <div>
            <!-- Logo e Nome -->
            <a href="../../area_pessoal.html">
                <img src="../../../assets/img/logo.png" alt="Logo da MedInventário">
            </a>
            <h3>MedInventário</h3>
        </div>

        <div>
            <button id="btn-utilizador" type="button" onclick="mostrarAreaUtilizador()">Utilizador</button>
        </div>

    </header>

    <!-- Sidebar -->
    <aside class="sidebar">
        <h4>Menu</h4>
        <nav>
            <a href="../equipamentos/lista.html"><i class="fas fa-laptop-medical"></i>Equipamentos</a>
            <a href="../fornecedores/lista.html"><i class="fas fa-truck-medical"></i>Fornecedores</a>
            <a href="../localizacoes/lista.html"><i class="fas fa-location-dot"></i>Localizações</a>
            <a href="../documentacao/documentacao.html"><i class="fas fa-file-medical"></i>Documentação</a>
            <a href="../garantias-contratos/garantias_contratos.html"><i class="fas fa-file-contract"></i>Garantias e Contratos</a>
            
            <a href="../dashboard/dashboard.html"><i class="fas fa-chart-bar"></i>Dashboard</a>
            <a href="ferramentas.html"><i class="fas fa-tools"></i>Ferramentas</a>
        </nav>
    </aside>

    <!-- Conteúdo Principal -->
    <main class="content">
        <section>
            <h2>Verificação Documental</h2>
            <p>Assinale os documentos associados ao equipamento.</p>

            <form action="#" method="post">

                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="manualUtilizador">
                    <label class="form-check-label" for="manualUtilizador">Manual de utilizador</label>
                </div>

                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="manualServico">
                    <label class="form-check-label" for="manualServico">Manual de serviço</label>
                </div>

                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="certificado">
                    <label class="form-check-label" for="certificado">Certificado de calibração</label>
                </div>

                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="contrato">
                    <label class="form-check-label" for="contrato">Contrato de manutenção</label>
                </div>

                <br>

                <button type="button" class="btn btn-secondary" onclick="verificarDocumentos()">
                    Verificar
                </button>

                <a href="ferramentas.html" class="btn btn-secondary">Voltar</a>
            </form>

            <div id="indicadorDocumentos" class="resultado-ferramenta"></div>
        </section>
    </main>

    <script>
        function verificarDocumentos() {
            const manualUtilizador = document.getElementById("manualUtilizador").checked;
            const manualServico = document.getElementById("manualServico").checked;
            const certificado = document.getElementById("certificado").checked;
            const contrato = document.getElementById("contrato").checked;
            const indicadorDocumentos = document.getElementById("indicadorDocumentos");

            let total = 0;

            if (manualUtilizador) {
                total++;
            }

            if (manualServico) {
                total++;
            }

            if (certificado) {
                total++;
            }

            if (contrato) {
                total++;
            }

            if (total === 4) {
                indicadorDocumentos.textContent = "Documentação completa.";
                indicadorDocumentos.className = "alert alert-success p-2 text-center resultado-ferramenta";
            } else if (total >= 2) {
                indicadorDocumentos.textContent = "Documentação parcialmente completa.";
                indicadorDocumentos.className = "alert alert-warning p-2 text-center resultado-ferramenta";
            } else {
                indicadorDocumentos.textContent = "Documentação insuficiente.";
                indicadorDocumentos.className = "alert alert-danger p-2 text-center resultado-ferramenta";
            }
        }
    </script>

    <!-- Bootstrap JS -->
    <script src="../../../assets/bootstrap/bootstrap.bundle.min.js"></script>

    <script src="../../../assets/js/1241445.js"></script>

</body>

</html>
