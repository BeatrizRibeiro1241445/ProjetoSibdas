<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedInventário - Ferramentas</title>

    <!-- favicon -->
    <link rel="shortcut icon" href="../../../assets/img/logo.png" type="image/png">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="../../../assets/bootstrap/bootstrap.min.css">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="../../../assets/fontawesome/all.min.css">

    <!-- folha de estilos CSS -->
    <link rel="stylesheet" href="../../../assets/css/1241445.css">
</head>

<body>
    <!-- Navbar -->
    <header class="bng-navbar-menu">

        <div>
            <!-- Logo e Nome -->
            <a href="../../area_pessoal.html">
                <img src="../../../assets/img/logo.png" alt="Logo da MedInventário">
            </a>
            <h3>MedInventário</h3>
        </div>

        <div>
            <button id="btn-utilizador" type="button" onclick="mostrarAreaUtilizador()">Utilizador</button>
        </div>

    </header>

    <!-- Sidebar -->
    <aside class="sidebar">
        <h4>Menu</h4>
        <nav>
            <a href="../equipamentos/lista.html"><i class="fas fa-laptop-medical"></i>Equipamentos</a>
            <a href="../fornecedores/lista.html"><i class="fas fa-truck-medical"></i>Fornecedores</a>
            <a href="../localizacoes/lista.html"><i class="fas fa-location-dot"></i>Localizações</a>
            <a href="../documentacao/documentacao.html"><i class="fas fa-file-medical"></i>Documentação</a>
            <a href="../garantias-contratos/garantias_contratos.html"><i class="fas fa-file-contract"></i>Garantias e Contratos</a>
            <a href="../pesquisa/pesquisa.html"><i class="fas fa-magnifying-glass"></i>Pesquisa</a>
            <a href="../dashboard/dashboard.html"><i class="fas fa-chart-bar"></i>Dashboard</a>
            <a href="ferramentas.html"><i class="fas fa-tools"></i>Ferramentas</a>
        </nav>
    </aside>

    <!-- Conteúdo Principal -->
    <main class="content">
        <section>
            <h2>Cálculo de Criticidade</h2>
            <p>Escolha a criticidade do equipamento para obter uma indicação visual.</p>

            <form action="#" method="post">
                <div class="mb-3">
                    <label for="criticidade" class="form-label">Criticidade</label>
                    <select class="form-select" id="criticidade" name="criticidade">
                        <option value="">Selecione uma opção</option>
                        <option value="baixa">Baixa</option>
                        <option value="media">Média</option>
                        <option value="alta">Alta</option>
                        <option value="suporte">Suporte de vida</option>
                    </select>
                </div>

                <button type="button" class="btn btn-secondary" onclick="calcularCriticidade()">
                    Calcular
                </button>

                <a href="ferramentas.html" class="btn btn-secondary">Voltar</a>
            </form>

            <div id="indicadorCriticidade" class="resultado-ferramenta"></div>
        </section>
    </main>

    <script>
        function calcularCriticidade() {
            const criticidade = document.getElementById("criticidade").value;
            const indicadorCriticidade = document.getElementById("indicadorCriticidade");

            if (criticidade === "") {
                indicadorCriticidade.textContent = "Erro: selecione uma criticidade.";
                indicadorCriticidade.className = "alert alert-danger p-2 text-center resultado-ferramenta";
            } else if (criticidade === "baixa") {
                indicadorCriticidade.textContent = "Criticidade baixa: equipamento com baixo impacto clínico.";
                indicadorCriticidade.className = "alert alert-success p-2 text-center resultado-ferramenta";
            } else if (criticidade === "media") {
                indicadorCriticidade.textContent = "Criticidade média: equipamento importante para o serviço.";
                indicadorCriticidade.className = "alert alert-warning p-2 text-center resultado-ferramenta";
            } else if (criticidade === "alta") {
                indicadorCriticidade.textContent = "Criticidade alta: equipamento relevante para cuidados clínicos.";
                indicadorCriticidade.className = "alert alert-danger p-2 text-center resultado-ferramenta";
            } else {
                indicadorCriticidade.textContent = "Suporte de vida: equipamento crítico com prioridade máxima.";
                indicadorCriticidade.className = "alert alert-danger p-2 text-center resultado-ferramenta";
            }
        }
    </script>

    <!-- Bootstrap JS -->
    <script src="../../../assets/bootstrap/bootstrap.bundle.min.js"></script>

    <script src="../../../assets/js/1241445.js"></script>

</body>

</html>
