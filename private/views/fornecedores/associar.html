    <link rel="stylesheet" href="../../../assets/fontawesome/all.min.css">

    <!-- folha de estilos CSS -->
    <link rel="stylesheet" href="../../../assets/css/1241445.css">
</head>

<body>
    <!-- Navbar -->
    <header class="bng-navbar-menu">

        <div>
            <a href="../../area_pessoal.html">
                <img src="../../../assets/img/logo.png" alt="Logo da MedInventário">
            </a>
            <h3>MedInventário</h3>
        </div>

        <div>
            <button id="btn-utilizador" type="button" onclick="mostrarAreaUtilizador()">Utilizador</button>
        </div>

    </header>

    <!-- Sidebar -->
    <aside class="sidebar">
        <h4>Menu</h4>
        <nav>
            <a href="../equipamentos/lista.html"><i class="fas fa-laptop-medical"></i> Equipamentos</a>
            <a href="../fornecedores/lista.html"><i class="fas fa-truck-medical"></i> Fornecedores</a>
            <a href="../localizacoes/lista.html"><i class="fas fa-location-dot"></i> Localizações</a>
            <a href="../documentacao/documentacao.html"><i class="fas fa-file-medical"></i> Documentação</a>
            <a href="../garantias-contratos/garantias_contratos.html"><i class="fas fa-file-contract"></i> Garantias e
                Contratos</a>
            <a href="../dashboard/dashboard.html"><i class="fas fa-chart-bar"></i> Dashboard</a>
        </nav>
    </aside>

    <!-- Conteúdo Principal -->
    <main class="content">
        <section>

            <h2><strong><i class="fas fa-link"></i> Associar Fornecedor a Equipamento</strong></h2>
            <p>Associe um fornecedor a um equipamento médico existente.</p>

            <form action="#" method="post" class="formulario-equipamento">

                <h3>Fornecedor</h3>

                <div class="row mb-3">
                    <div class="col-12 col-md-6">
                        <label for="empresa" class="form-label">Nome da empresa</label>
                        <input type="text" class="form-control" id="empresa" name="empresa" value="MedTech Portugal"
                            readonly>
                    </div>

                    <div class="col-12 col-md-6">
                        <label for="nif" class="form-label">NIF</label>
                        <input type="text" class="form-control" id="nif" name="nif" value="509000000" readonly>
                    </div>
                </div>

                <h3>Equipamento a associar</h3>

                <div class="row mb-3">
                    <div class="col-12 col-md-6">
                        <label for="codigo_equipamento" class="form-label">Código interno do equipamento *</label>
                        <input type="text" class="form-control" id="codigo_equipamento" name="codigo_equipamento"
                            placeholder="Ex.: 004.002.00" required>
                    </div>

                    <div class="col-12 col-md-6">
                        <label for="nome_equipamento" class="form-label">Nome do equipamento *</label>
                        <input type="text" class="form-control" id="nome_equipamento" name="nome_equipamento"
                            placeholder="Ex.: Monitor Multiparamétrico" required>
                    </div>
                </div>

                <div class="mb-3">
                    <label for="tipo_associacao" class="form-label">Tipo de associação *</label>
                    <input type="text" class="form-control" id="tipo_associacao" name="tipo_associacao"
                        placeholder="Ex.: Fabricante, fornecedor comercial, assistência técnica, consumíveis/acessórios"
                        required>
                </div>

                <div class="mb-3">
                    <label for="observacoes" class="form-label">Observações</label>
                    <textarea class="form-control" id="observacoes" name="observacoes" rows="4"
                        placeholder="Indique detalhes adicionais sobre esta associação."></textarea>
                </div>

                <div class="d-flex justify-content-end gap-2">
                    <a href="lista.html" class="btn btn-secondary">Cancelar</a>

                    <button type="submit" class="btn btn-primary">
                        Guardar associação
                    </button>
                </div>

            </form>

            <p id="mensagem-formulario"></p>

        </section>
    </main>

    <!-- Bootstrap JS -->
    <script src="../../../assets/bootstrap/bootstrap.bundle.min.js"></script>

    <!-- JavaScript -->
    <script src="../../../assets/js/1241445.js"></script>

</body>
