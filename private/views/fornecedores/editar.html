<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedInventário - Editar Fornecedor</title>

    <!-- favicon -->
    <link rel="shortcut icon" href="../../../assets/img/logo.png" type="image/png">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="../../../assets/bootstrap/bootstrap.min.css">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="../../../assets/fontawesome/all.min.css">

    <!-- folha de estilos CSS -->
    <link rel="stylesheet" href="../../../assets/css/1241445.css">
</head>

<body>
    <!-- Navbar -->
    <header class="bng-navbar-menu">

        <div>
            <a href="../../area_pessoal.html">
                <img src="../../../assets/img/logo.png" alt="Logo da MedInventário">
            </a>
            <h3>MedInventário</h3>
        </div>

        <div>
            <button id="btn-utilizador" type="button" onclick="mostrarAreaUtilizador()">Utilizador</button>
        </div>

    </header>

    <!-- Sidebar -->
<aside class="sidebar">
    <h4>Menu</h4>

    <nav>
        <a href="../equipamentos/lista.html">
            <i class="fas fa-laptop-medical"></i> Equipamentos
        </a>

        <a href="../fornecedores/lista.html">
            <i class="fas fa-truck-medical"></i> Fornecedores
        </a>

        <a href="../localizacoes/lista.html">
            <i class="fas fa-location-dot"></i> Localizações
        </a>

        <a href="../gestao_conteudos/gestao_conteudos.html">
            <i class="fas fa-pen-to-square"></i> Conteúdos do site
        </a>

        <a href="../dashboard/dashboard.html">
            <i class="fas fa-chart-bar"></i> Dashboard
        </a>
    </nav>
</aside>
    <!-- Conteúdo Principal -->
    <main class="content">
        <section>

            <div class="actions-top">
                <h2>
                    <strong>
                        <i class="fas fa-pen"></i> Editar Fornecedor
                    </strong>
                </h2>

                <a href="lista.html" class="btn btn-secondary" title="Voltar à lista">
                    <i class="fas fa-arrow-left"></i>
                </a>
            </div>

            <hr>

            <form action="#" method="post" class="formulario-equipamento">

                <div class="card mb-4">
                    <div class="card-body">

                        <h3>
                            <i class="fas fa-building"></i> Identificação do fornecedor
                        </h3>

                        <div class="row mb-3">

                            <div class="col-12 col-md-6">
                                <label for="empresa" class="form-label">Nome da empresa</label>
                                <input type="text" class="form-control" id="empresa" name="empresa"
                                    value="MedTech Portugal">
                            </div>

                            <div class="col-12 col-md-6">
                                <label for="nif" class="form-label">NIF</label>
                                <input type="text" class="form-control" id="nif" name="nif" value="509000000">
                            </div>

                        </div>

                    </div>
                </div>
                <div class="card mb-4">
                    <div class="card-body">

                        <h3>
                            <i class="fas fa-phone"></i> Contactos gerais
                        </h3>

                        <div class="row mb-3">

                            <div class="col-12 col-md-6">
                                <label for="telefone" class="form-label">Contacto telefónico</label>
                                <input type="text" class="form-control" id="telefone" name="telefone"
                                    value="+351 220 000 000">
                            </div>

                            <div class="col-12 col-md-6">
                                <label for="email" class="form-label">Email</label>
                                <input type="email" class="form-control" id="email" name="email"
                                    value="geral@medtech.pt">
                            </div>

                        </div>

                        <div class="mb-3">
                            <label for="morada" class="form-label">Morada</label>
                            <input type="text" class="form-control" id="morada" name="morada"
                                value="Rua da Saúde, Porto, Portugal">
                        </div>

                        <div class="mb-3">
                            <label for="website" class="form-label">Website</label>
                            <input type="text" class="form-control" id="website" name="website"
                                value="https://www.medtech.pt">
                        </div>

                    </div>
                </div>
                <div class="card mb-4">
                    <div class="card-body">

                        <h3>
                            <i class="fas fa-circle-info"></i> Observações
                        </h3>

                        <div class="mb-3">
                            <label for="observacoes" class="form-label">Observações</label>
                            <textarea class="form-control" id="observacoes" name="observacoes"
                                rows="4">Fornecedor responsável por assistência técnica de equipamentos críticos.</textarea>
                        </div>

                    </div>
                </div>

                <div class="d-flex justify-content-end gap-2">

                    <a href="lista.html" class="btn btn-secondary">
                        Cancelar
                    </a>

                    <button type="button" class="btn btn-primary" onclick="mostrarMensagemFormulario()">
                        Guardar alterações
                    </button>

                </div>

            </form>

            <p id="mensagem-formulario"></p>

        </section>
    </main>

    <!-- Bootstrap JS -->
    <script src="../../../assets/bootstrap/bootstrap.bundle.min.js"></script>

    <!-- JavaScript -->
    <script src="../../../assets/js/1241445.js"></script>

</body>

</html>
