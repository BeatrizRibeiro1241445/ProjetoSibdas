    <link rel="stylesheet" href="../../../assets/fontawesome/all.min.css">

    <!-- folha de estilos CSS -->
    <link rel="stylesheet" href="../../../assets/css/1241445.css">
</head>

<body>
    <!-- Navbar -->
    <header class="bng-navbar-menu">

        <div>
            <a href="../../area_pessoal.html">
                <img src="../../../assets/img/logo.png" alt="Logo da MedInventário">
            </a>
            <h3>MedInventário</h3>
        </div>

        <div>
            <button id="btn-utilizador" type="button" onclick="mostrarAreaUtilizador()">Utilizador</button>
        </div>

    </header>

    <!-- Sidebar -->
    <aside class="sidebar">
        <h4>Menu</h4>
        <nav>
            <a href="../equipamentos/lista.html"><i class="fas fa-laptop-medical"></i> Equipamentos</a>
            <a href="../fornecedores/lista.html"><i class="fas fa-truck-medical"></i> Fornecedores</a>
            <a href="../localizacoes/lista.html"><i class="fas fa-location-dot"></i> Localizações</a>

            <a href="../garantias-contratos/garantias_contratos.html"><i class="fas fa-file-contract"></i> Garantias e
                Contratos</a>

            <a href="../ferramentas/ferramentas.html"><i class="fas fa-tools"></i> Ferramentas</a>
        </nav>
    </aside>

    <!-- Conteúdo Principal -->
    <main class="content">
        <section>

            <h2><strong><i class="fas fa-plus"></i> Adicionar Documento</strong></h2>
            <p>Associe um novo documento técnico ou administrativo a um equipamento.</p>

            <form action="#" method="post" class="formulario-equipamento">

                <h3>Equipamento associado</h3>

                <div class="row mb-3">
                    <div class="col-12 col-md-4">
                        <label for="codigo" class="form-label">Código interno *</label>
                        <input type="text" class="form-control" id="codigo" name="codigo" value="004.002.00" required>
                    </div>

                    <div class="col-12 col-md-4">
                        <label for="designacao" class="form-label">Designação *</label>
                        <input type="text" class="form-control" id="designacao" name="designacao"
                            value="Monitor Multiparamétrico" required>
                    </div>

                    <div class="col-12 col-md-4">
                        <label for="numero_serie" class="form-label">Número de série</label>
                        <input type="text" class="form-control" id="numero_serie" name="numero_serie"
                            value="MP5-2022-45873">
                    </div>
                </div>

                <h3>Dados do documento</h3>

                <div class="mb-3">
                    <label for="tipo_documento" class="form-label">Tipo de documento *</label>
                    <input type="text" class="form-control" id="tipo_documento" name="tipo_documento"
                        placeholder="Ex.: Manual técnico, Certificado de calibração, Contrato de manutenção" required>
                </div>

                <div class="mb-3">
                    <label for="nome_documento" class="form-label">Nome do documento *</label>
                    <input type="text" class="form-control" id="nome_documento" name="nome_documento"
                        placeholder="Ex.: Certificado de Calibração" required>
                </div>

                <div class="row mb-3">
                    <div class="col-12 col-md-6">
                        <label for="data_documento" class="form-label">Data do documento</label>
                        <input type="date" class="form-control" id="data_documento" name="data_documento">
                    </div>

                    <div class="col-12 col-md-6">
                        <label for="data_validade" class="form-label">Data de validade / expiração</label>
                        <input type="date" class="form-control" id="data_validade" name="data_validade">
                    </div>
                </div>

                <div class="mb-3">
                    <label for="fornecedor_documento" class="form-label">Fornecedor associado</label>
                    <input type="text" class="form-control" id="fornecedor_documento" name="fornecedor_documento"
                        placeholder="Ex.: MedTech Portugal">
                </div>

                <div class="mb-3">
                    <label for="ficheiro_ligacao" class="form-label">Ficheiro ou ligação *</label>
                    <input type="text" class="form-control" id="ficheiro_ligacao" name="ficheiro_ligacao"
                        placeholder="Ex.: docs/certificado-calibracao.pdf ou https://exemplo.pt/documento.pdf" required>
                </div>

                <div class="d-flex justify-content-end gap-2">
                    <a href="documentacao.html" class="btn btn-secondary">Cancelar</a>

                    <button type="submit" class="btn btn-primary">
                        Guardar documento
                    </button>
                </div>

            </form>

            <p id="mensagem-formulario"></p>

        </section>
    </main>

    <!-- Bootstrap JS -->
    <script src="../../../assets/bootstrap/bootstrap.bundle.min.js"></script>

    <!-- JavaScript -->
    <script src="../../../assets/js/1241445.js"></script>

</body>

</html>
