<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedInventário - Área Pessoal</title>

    <!-- favicon -->
    <link rel="shortcut icon" href="assets/img/logo.png" type="image/png">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="assets/bootstrap/bootstrap.min.css">

    <!-- folha de estilos CSS -->
    <link rel="stylesheet" href="assets/css/estilos.css">
</head>

<body>
    <!-- Navbar -->
    <header class="bng-navbar-menu">

        <div>
            <!-- Logo e Nome -->
            <a href="area_pessoal.html">
                <img src="assets/img/logo.png" alt="Logo da empresa" height="50">
            </a>
            <h3>MedInventário</h3>
        </div>

        <div>
            <button id="btn-utilizador">Utilizador</button>
        </div>

    </header>

    <!-- Sidebar -->
    <aside class="sidebar">
        <h4>Menu</h4>
        <nav>
            <a href="equipamentos.html">Equipamentos</a>
            <a href="localizacoes.html">Localizações</a>
            <a href="fornecedores.html">Fornecedores</a>
            <a href="documentacao.html">Documentação</a>
            <a href="garantias_contratos.html">Garantias e Contratos</a>
            <a href="pesquisa.html">Pesquisa</a>
            <a href="dashboard.html">Dashboard</a>
        </nav>
    </aside>

    <!-- Conteúdo Principal -->
    <main class="content">
        <section>
            <h2>Pesquisa e Filtragem</h2>
            <p>Aqui poderá pesquisar equipamentos por diferentes critérios.</p>

            <form action="#" method="get" class="row g-3 mt-4">

                <div class="col-md-4">
                    <label for="codigo" class="form-label">Código interno</label>
                    <input type="text" class="form-control" id="codigo" name="codigo">
                </div>

                <div class="col-md-4">
                    <label for="designacao" class="form-label">Designação</label>
                    <input type="text" class="form-control" id="designacao" name="designacao">
                </div>

                <div class="col-md-4">
                    <label for="estado" class="form-label">Estado</label>
                    <select class="form-select" id="estado" name="estado">
                        <option value="">Todos</option>
                        <option value="ativo">Ativo</option>
                        <option value="manutencao">Em manutenção</option>
                        <option value="inativo">Inativo</option>
                        <option value="calibracao">Em calibração</option>
                        <option value="abatido">Abatido</option>
                    </select>
                </div>

                <div class="col-12">
                    <button class="btn btn-primary" type="submit">Pesquisar</button>
                    <button class="btn btn-secondary" type="reset">Limpar</button>
                </div>

            </form>
        </section>
    </main>

    <!-- Bootstrap JS -->
    <script src="assets/bootstrap/bootstrap.bundle.min.js"></script>

    <script src="assets/js/script.js"></script>

</body>

</html>
