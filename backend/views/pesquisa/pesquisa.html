<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedInventário - Área Pessoal</title>

    <!-- favicon -->
    <link rel="shortcut icon" href="../../../assets/images/logo.png" type="image/png">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="../../assets/bootstrap/bootstrap.min.css">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="../../assets/fontawesome/all.min.css">

    <!-- folha de estilos CSS -->
    <link rel="stylesheet" href="../../assets/css/estilos.css">
</head>

<body>
    <!-- Navbar -->
    <header class="bng-navbar-menu">

        <div>
            <!-- Logo e Nome -->
            <a href="../../area_pessoal.html">
                <img src="../../../assets/images/logo.png" alt="Logo da MedInventário">
            </a>
            <h3>MedInventário</h3>
        </div>

        <div>
            <button id="btn-utilizador" type="button" onclick="mostrarAreaUtilizador()">Utilizador</button>
        </div>

    </header>

    <!-- Sidebar -->
    <aside class="sidebar">
        <h4>Menu</h4>
        <nav>
            <a href="../equipamentos/lista.html"><i class="fas fa-laptop-medical"></i>Equipamentos</a>
            <a href="../fornecedores/lista.html"><i class="fas fa-truck-medical"></i>Fornecedores</a>
            <a href="../localizacoes/lista.html"><i class="fas fa-location-dot"></i>Localizações</a>
            <a href="../documentacao/documentacao.html"><i class="fas fa-file-medical"></i>Documentação</a>
            <a href="../garantias-contratos/garantias_contratos.html"><i class="fas fa-file-contract"></i>Garantias e Contratos</a>
            <a href="../pesquisa/pesquisa.html"><i class="fas fa-magnifying-glass"></i>Pesquisa</a>
            <a href="../dashboard/dashboard.html"><i class="fas fa-chart-bar"></i>Dashboard</a>
            <a href="../ferramentas/ferramentas.html"><i class="fas fa-tools"></i>Ferramentas</a>
        </nav>
    </aside>

    <!-- Conteúdo Principal -->
    <main class="content">
        <section>
            <h2><strong><i class="fas fa-magnifying-glass"></i> Pesquisa e Filtragem</strong></h2>
            <p>Aqui poderá pesquisar equipamentos por diferentes critérios.</p>

            <form action="#" method="get" class="row g-3 mt-4">

                <div class="col-md-4">
                    <label for="codigo" class="form-label">Código interno</label>
                    <input type="text" class="form-control" id="codigo" name="codigo">
                </div>

                <div class="col-md-4">
                    <label for="designacao" class="form-label">Designação</label>
                    <input type="text" class="form-control" id="designacao" name="designacao">
                </div>

                <div class="col-md-4">
                    <label for="estado" class="form-label">Estado</label>
                    <select class="form-select" id="estado" name="estado">
                        <option value="">Todos</option>
                        <option value="ativo">Ativo</option>
                        <option value="manutencao">Em manutenção</option>
                        <option value="inativo">Inativo</option>
                        <option value="calibracao">Em calibração</option>
                        <option value="abatido">Abatido</option>
                    </select>
                </div>

                <div class="col-12">
                    <button class="btn btn-primary" type="submit">Pesquisar</button>
                    <button class="btn btn-secondary" type="reset">Limpar</button>
                </div>

            </form>
        </section>
    </main>

    <!-- Bootstrap JS -->
    <script src="../../assets/bootstrap/bootstrap.bundle.min.js"></script>

    <script src="../../assets/js/script.js"></script>

</body>

</html>
