<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedInventário - Ferramentas</title>

    <!-- favicon -->
    <link rel="shortcut icon" href="../../../assets/images/logo.png" type="image/png">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="../../assets/bootstrap/bootstrap.min.css">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="../../assets/fontawesome/all.min.css">

    <!-- folha de estilos CSS -->
    <link rel="stylesheet" href="../../assets/css/estilos.css">
</head>

<body>
    <!-- Navbar -->
    <header class="bng-navbar-menu">

        <div>
            <!-- Logo e Nome -->
            <a href="../../area_pessoal.html">
                <img src="../../../assets/images/logo.png" alt="Logo da MedInventário">
            </a>
            <h3>MedInventário</h3>
        </div>

        <div>
            <button id="btn-utilizador" type="button" onclick="mostrarAreaUtilizador()">Utilizador</button>
        </div>

    </header>

    <!-- Sidebar -->
    <aside class="sidebar">
        <h4>Menu</h4>
        <nav>
            <a href="../equipamentos/lista.html"><i class="fas fa-laptop-medical"></i> &ensp; Equipamentos</a>
            <a href="../fornecedores/lista.html"><i class="fas fa-truck-medical"></i> &ensp; Fornecedores</a>
            <a href="../localizacoes/lista.html"><i class="fas fa-location-dot"></i> &ensp; Localizações</a>
            <a href="../documentacao/documentacao.html"><i class="fas fa-file-medical"></i> &ensp; Documentação</a>
            <a href="../garantias-contratos/garantias_contratos.html"><i class="fas fa-file-contract"></i> &ensp; Garantias e Contratos</a>
            <a href="../pesquisa/pesquisa.html"><i class="fas fa-magnifying-glass"></i> &ensp; Pesquisa</a>
            <a href="../dashboard/dashboard.html"><i class="fas fa-chart-bar"></i> &ensp; Dashboard</a>
            <a href="ferramentas.html"><i class="fas fa-tools"></i> &ensp; Ferramentas</a>
        </nav>
    </aside>

    <!-- Conteúdo Principal -->
    <main class="content">
        <section>
            <h2>Resumo do Inventário</h2>
            <p>Introduza valores para calcular o total de equipamentos.</p>

            <form action="#" method="post">
                <div class="mb-3">
                    <label for="ativos" class="form-label">Equipamentos ativos</label>
                    <input type="number" class="form-control" id="ativos" name="ativos">
                </div>

                <div class="mb-3">
                    <label for="manutencao" class="form-label">Equipamentos em manutenção</label>
                    <input type="number" class="form-control" id="manutencao" name="manutencao">
                </div>

                <div class="mb-3">
                    <label for="inativos" class="form-label">Equipamentos inativos</label>
                    <input type="number" class="form-control" id="inativos" name="inativos">
                </div>

                <button type="button" class="btn btn-secondary" onclick="calcularResumo()">
                    Calcular
                </button>

                <a href="ferramentas.html" class="btn btn-secondary">Voltar</a>
            </form>

            <div id="indicadorResumo" class="resultado-ferramenta"></div>
        </section>
    </main>

    <script>
        function calcularResumo() {
            const ativos = parseInt(document.getElementById("ativos").value);
            const manutencao = parseInt(document.getElementById("manutencao").value);
            const inativos = parseInt(document.getElementById("inativos").value);
            const indicadorResumo = document.getElementById("indicadorResumo");

            const total = ativos + manutencao + inativos;

            if (total === 0) {
                indicadorResumo.textContent = "Erro: introduza pelo menos um valor.";
                indicadorResumo.className = "alert alert-danger p-2 text-center resultado-ferramenta";
            } else {
                indicadorResumo.textContent = "Total de equipamentos: " + total +
                    " | Ativos: " + ativos +
                    " | Em manutenção: " + manutencao +
                    " | Inativos: " + inativos;

                indicadorResumo.className = "alert alert-info p-2 text-center resultado-ferramenta";
            }
        }
    </script>

    <!-- Bootstrap JS -->
    <script src="../../assets/bootstrap/bootstrap.bundle.min.js"></script>

    <script src="../../assets/js/script.js"></script>

</body>

</html>
