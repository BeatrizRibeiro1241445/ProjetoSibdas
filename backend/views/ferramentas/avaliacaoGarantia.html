<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- favicon -->
    <link rel="shortcut icon" href="../../../assets/images/logo.png" type="image/png">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="../../assets/bootstrap/bootstrap.min.css">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="../../assets/fontawesome/all.min.css">

    <!-- folha de estilos CSS -->
    <link rel="stylesheet" href="../../assets/css/estilos.css">
</head>

<body>
    <!-- Navbar -->
    <header class="bng-navbar-menu">

        <div>
            <!-- Logo e Nome -->
            <a href="../../area_pessoal.html">
                <img src="../../../assets/images/logo.png" alt="Logo da MedInventário">
            </a>
            <h3>MedInventário</h3>
        </div>

        <div>
            <button id="btn-utilizador" type="button" onclick="mostrarAreaUtilizador()">Utilizador</button>
        </div>

    </header>

    <!-- Sidebar -->
    <aside class="sidebar">
        <h4>Menu</h4>
        <nav>
            <a href="../equipamentos/lista.html"><i class="fas fa-laptop-medical"></i> &ensp; Equipamentos</a>
            <a href="../fornecedores/lista.html"><i class="fas fa-truck-medical"></i> &ensp; Fornecedores</a>
            <a href="../localizacoes/lista.html"><i class="fas fa-location-dot"></i> &ensp; Localizações</a>
            <a href="../documentacao/documentacao.html"><i class="fas fa-file-medical"></i> &ensp; Documentação</a>
            <a href="../garantias-contratos/garantias_contratos.html"><i class="fas fa-file-contract"></i> &ensp; Garantias e Contratos</a>
            <a href="../pesquisa/pesquisa.html"><i class="fas fa-magnifying-glass"></i> &ensp; Pesquisa</a>
            <a href="../dashboard/dashboard.html"><i class="fas fa-chart-bar"></i> &ensp; Dashboard</a>
            <a href="ferramentas.html"><i class="fas fa-tools"></i> &ensp; Ferramentas</a>
        </nav>
    </aside>

    <!-- Conteúdo Principal -->
    <main class="content">
        <section>
            <h2>Avaliação de Garantia</h2>
            <p>Introduza os dias restantes de garantia para verificar o estado.</p>

            <form action="#" method="post">
                <div class="mb-3">
                    <label for="diasGarantia" class="form-label">Dias restantes de garantia</label>
                    <input type="number" class="form-control" id="diasGarantia" name="diasGarantia">
                </div>

                <button type="button" class="btn btn-secondary" onclick="avaliarGarantia()">
                    Avaliar
                </button>

                <a href="ferramentas.html" class="btn btn-secondary">Voltar</a>
            </form>

            <div id="indicadorGarantia" class="resultado-ferramenta"></div>
        </section>
    </main>

    <script>
        function avaliarGarantia() {
            const diasGarantia = parseInt(document.getElementById("diasGarantia").value);
            const indicadorGarantia = document.getElementById("indicadorGarantia");

            if (document.getElementById("diasGarantia").value === "") {
                indicadorGarantia.textContent = "Erro: introduza os dias restantes.";
                indicadorGarantia.className = "alert alert-danger p-2 text-center resultado-ferramenta";
            } else if (diasGarantia < 0) {
                indicadorGarantia.textContent = "Garantia expirada.";
                indicadorGarantia.className = "alert alert-danger p-2 text-center resultado-ferramenta";
            } else if (diasGarantia <= 30) {
                indicadorGarantia.textContent = "Atenção: garantia a terminar nos próximos 30 dias.";
                indicadorGarantia.className = "alert alert-warning p-2 text-center resultado-ferramenta";
            } else {
                indicadorGarantia.textContent = "Garantia válida.";
                indicadorGarantia.className = "alert alert-success p-2 text-center resultado-ferramenta";
            }
        }
    </script>

    <!-- Bootstrap JS -->
    <script src="../../assets/bootstrap/bootstrap.bundle.min.js"></script>

    <script src="../../assets/js/script.js"></script>

</body>

</html>
