<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedInventário - Ferramentas</title>

    <!-- favicon -->
    <link rel="shortcut icon" href="../../../assets/images/logo.png" type="image/png">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="../../assets/bootstrap/bootstrap.min.css">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="../../assets/fontawesome/all.min.css">

    <!-- folha de estilos CSS -->
    <link rel="stylesheet" href="../../assets/css/estilos.css">
</head>

<body>
    <!-- Navbar -->
    <header class="bng-navbar-menu">

        <div>
            <!-- Logo e Nome -->
            <a href="../../area_pessoal.html">
                <img src="../../../assets/images/logo.png" alt="Logo da MedInventário">
            </a>
            <h3>MedInventário</h3>
        </div>

        <div>
            <button id="btn-utilizador" type="button" onclick="mostrarAreaUtilizador()">Utilizador</button>
        </div>

    </header>

    <!-- Sidebar -->
    <aside class="sidebar">
        <h4>Menu</h4>
        <nav>
            <a href="../equipamentos/lista.html"><i class="fas fa-laptop-medical"></i>Equipamentos</a>
            <a href="../fornecedores/lista.html"><i class="fas fa-truck-medical"></i>Fornecedores</a>
            <a href="../localizacoes/lista.html"><i class="fas fa-location-dot"></i>Localizações</a>
            <a href="../documentacao/documentacao.html"><i class="fas fa-file-medical"></i>Documentação</a>
            <a href="../garantias-contratos/garantias_contratos.html"><i class="fas fa-file-contract"></i>Garantias e Contratos</a>
            <a href="../pesquisa/pesquisa.html"><i class="fas fa-magnifying-glass"></i>Pesquisa</a>
            <a href="../dashboard/dashboard.html"><i class="fas fa-chart-bar"></i>Dashboard</a>
            <a href="ferramentas.html"><i class="fas fa-tools"></i>Ferramentas</a>
        </nav>
    </aside>

    <!-- Conteúdo Principal -->
    <main class="content">
        <section>
            <h2>Contratos</h2>
            <p>Passe o rato no botão ou clique para simular uma mensagem sobre contratos.</p>

            <button type="button" class="btn btn-secondary" onmouseover="mostrarAvisoContrato()"
                onclick="confirmarContrato()">
                Verificar contrato
            </button>

            <a href="ferramentas.html" class="btn btn-secondary">Voltar</a>

            <div id="indicadorContrato" class="resultado-ferramenta"></div>
        </section>
    </main>

    <script>
        function mostrarAvisoContrato() {
            const indicadorContrato = document.getElementById("indicadorContrato");

            indicadorContrato.textContent = "Verifique sempre a entidade responsável e a data de fim do contrato.";
            indicadorContrato.className = "alert alert-warning p-2 text-center resultado-ferramenta";
        }

        function confirmarContrato() {
            const indicadorContrato = document.getElementById("indicadorContrato");

            indicadorContrato.textContent = "Contrato consultado em modo de teste.";
            indicadorContrato.className = "alert alert-info p-2 text-center resultado-ferramenta";
        }
    </script>

    <!-- Bootstrap JS -->
    <script src="../../assets/bootstrap/bootstrap.bundle.min.js"></script>

    <script src="../../assets/js/script.js"></script>

</body>

</html>
